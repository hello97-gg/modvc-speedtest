<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MODVC Speed Test - Test Your Internet Speed</title>
    <meta name="description" content="Test your internet speed instantly with MODVC Speed Test. Measure download, upload speeds and latency.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%2310B981' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='65' font-family='Arial' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3EMV%3C/text%3E%3C/svg%3E">
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <header>
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="50" height="50" rx="10" fill="url(#logoGradient)"/>
                <text x="25" y="33" font-family="Inter, sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">MV</text>
                <defs>
                    <linearGradient id="logoGradient" x1="0" y1="0" x2="50" y2="50">
                        <stop offset="0%" stop-color="#10B981"/>
                        <stop offset="100%" stop-color="#059669"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="logo-text">MODVC<span class="logo-accent">Speed</span></span>
        </div>
        <nav>
            <a href="https://play.modvc.org" target="_blank" class="nav-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                Play Now
            </a>
        </nav>
    </header>

    <main>
        <div class="speedometer-container">
            <!-- Custom SVG Speedometer -->
            <svg class="speedometer" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="meterGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
                        <stop offset="50%" stop-color="#10B981"/>
                        <stop offset="100%" stop-color="#34D399"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                <!-- Background arc -->
                <path class="meter-bg" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#1f2937" stroke-width="12" stroke-linecap="round"/>
                <!-- Progress arc -->
                <path class="meter-progress" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="url(#meterGradient)" stroke-width="12" stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2" filter="url(#glow)"/>
                <!-- Speed indicator dots -->
                <g class="speed-dots">
                    <circle cx="20" cy="100" r="3" fill="#374151"/>
                    <circle cx="45" cy="55" r="3" fill="#374151"/>
                    <circle cx="100" cy="30" r="3" fill="#374151"/>
                    <circle cx="155" cy="55" r="3" fill="#374151"/>
                    <circle cx="180" cy="100" r="3" fill="#374151"/>
                </g>
            </svg>

            <!-- Speed Display -->
            <div class="speed-display">
                <div class="speed-value-container">
                    <span class="speed-value" id="speedValue">0</span>
                    <span class="speed-unit">Mbps</span>
                </div>
                <p class="speed-label" id="speedLabel">Click to start test</p>
            </div>
        </div>

        <!-- Start/Restart Button -->
        <button class="start-btn" id="startBtn">
            <svg class="start-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3" fill="currentColor"></polygon>
            </svg>
            <svg class="restart-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M23 4v6h-6"></path>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
            <span id="btnText">Start Test</span>
        </button>

        <!-- More Info Section (Hidden by default) -->
        <button class="more-info-btn" id="moreInfoBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
            <span>Show more info</span>
        </button>

        <div class="extended-info hidden" id="extendedInfo">
            <div class="info-grid">
                <!-- Latency Section -->
                <div class="info-card">
                    <h3>Latency</h3>
                    <div class="latency-grid">
                        <div class="latency-item">
                            <span class="latency-label">Unloaded</span>
                            <div class="latency-value">
                                <span id="pingUnloaded">--</span>
                                <span class="unit">ms</span>
                            </div>
                        </div>
                        <div class="latency-item">
                            <span class="latency-label">Loaded</span>
                            <div class="latency-value">
                                <span id="pingLoaded">--</span>
                                <span class="unit">ms</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Upload Section -->
                <div class="info-card">
                    <h3>Upload</h3>
                    <div class="upload-display">
                        <span class="upload-value" id="uploadSpeed">--</span>
                        <span class="upload-unit">Mbps</span>
                    </div>
                </div>
            </div>

            <!-- Connection Info -->
            <div class="connection-info">
                <div class="connection-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                    </svg>
                    <span>Client:</span>
                    <span id="clientLocation">Detecting...</span>
                </div>
                <div class="connection-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                        <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                        <line x1="6" y1="6" x2="6.01" y2="6"></line>
                        <line x1="6" y1="18" x2="6.01" y2="18"></line>
                    </svg>
                    <span>Server:</span>
                    <span id="serverLocation">Auto-selected</span>
                </div>
            </div>

            <!-- Data Transferred -->
            <div class="data-transferred">
                <div class="data-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span id="downloadData">0 MB</span>
                </div>
                <div class="data-item">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span id="uploadData">0 MB</span>
                </div>
            </div>
        </div>

        <!-- Settings Button -->
        <button class="settings-btn" id="settingsBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            Settings
        </button>

        <!-- Settings Modal -->
        <div class="modal-overlay hidden" id="settingsModal">
            <div class="modal">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <button class="modal-close" id="closeSettings">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div class="modal-content">
                    <div class="setting-group">
                        <label>Parallel connections</label>
                        <div class="input-row">
                            <div class="input-field">
                                <span>Min:</span>
                                <input type="number" id="connectionsMin" value="1" min="1" max="16">
                            </div>
                            <div class="input-field">
                                <span>Max:</span>
                                <input type="number" id="connectionsMax" value="8" min="1" max="16">
                            </div>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>Test duration (seconds)</label>
                        <div class="input-row">
                            <div class="input-field">
                                <span>Min:</span>
                                <input type="number" id="durationMin" value="5" min="1" max="60">
                            </div>
                            <div class="input-field">
                                <span>Max:</span>
                                <input type="number" id="durationMax" value="30" min="1" max="60">
                            </div>
                        </div>
                    </div>
                    <div class="setting-group checkboxes">
                        <label class="checkbox-label">
                            <input type="checkbox" id="measureLoaded">
                            <span class="checkmark"></span>
                            Measure loaded latency during upload
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="showAllMetrics" checked>
                            <span class="checkmark"></span>
                            Always show all metrics
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="saveConfig">
                            <span class="checkmark"></span>
                            Save config for this device
                        </label>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" id="resetSettings">Reset</button>
                        <button class="btn-primary" id="saveSettings">Save</button>
                        <button class="btn-secondary" id="cancelSettings">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#" class="footer-icon" title="Help">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="17" r="1"/>
                </svg>
            </a>
            <a href="https://play.modvc.org" target="_blank" class="footer-icon" title="MODVC">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect width="24" height="24" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
                    <text x="12" y="16" font-family="Inter, sans-serif" font-size="8" font-weight="800" fill="currentColor" text-anchor="middle">MV</text>
                </svg>
            </a>
            <a href="https://twitter.com" target="_blank" class="footer-icon" title="Twitter">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
            </a>
        </div>
        <p class="footer-text">Powered by MODVC • <a href="https://play.modvc.org">play.modvc.org</a></p>
    </footer>

    <script src="speedtest.js"></script>
</body>
</html>
