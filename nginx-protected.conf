# Nginx configuration for test.modvc.org with DDoS protection
# This file is auto-managed by certbot

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=speedtest_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=speedtest_conn:10m;

server {
    listen 80;
    server_name test.modvc.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name test.modvc.org;

    # SSL (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/test.modvc.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.modvc.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ===== DDOS PROTECTION =====
    
    # Rate limiting - 10 requests/second with burst of 20
    limit_req zone=speedtest_limit burst=20 nodelay;
    
    # Connection limiting - max 20 connections per IP
    limit_conn speedtest_conn 20;
    
    # Limit request body size
    client_max_body_size 10m;
    
    # Timeouts to prevent slowloris attacks
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 30s;
    keepalive_timeout 30s;
    
    # Block common attack patterns
    if ($http_user_agent ~* (bot|crawl|spider|scan|nikto|sqlmap)) {
        return 403;
    }
    
    # Block empty user agents
    if ($http_user_agent = "") {
        return 403;
    }

    # ===== SECURITY HEADERS =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== PROXY TO NODE.JS =====
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for speed test
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
    }
    
    # Stricter limits for test endpoints
    location ~ ^/(download|upload) {
        limit_req zone=speedtest_limit burst=10 nodelay;
        
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
